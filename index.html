<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我的 GitHub 页面</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f5f7fb;
      color: #222;
    }

    .card {
      text-align: center;
      padding: 40px 32px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      max-width: 480px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 32px;
    }

    p {
      margin: 0;
      font-size: 16px;
      line-height: 1.6;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello 小皮</h1>
    <p>这是我部署在 GitHub Pages 上的第一个静态网站。</p >
  </div>
</body>
</html>
